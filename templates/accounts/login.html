<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — Uy-Joy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2563eb, #1e40af); min-height: 100vh; display:flex; align-items:center; }
        .auth-card { border:none; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
        .btn-primary { background:#2563eb; border:none; }
        .btn-primary:hover { background:#1e40af; }
        .face-btn { background:#10b981; border:none; color:white; }
        .face-btn:hover { background:#059669; color:white; }
        #video { width:100%; border-radius:12px; display:none; }
        #canvas { display:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card auth-card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-home fa-2x text-primary mb-2"></i>
                    <h4 class="fw-bold">Uy-Joy ga kirish</h4>
                    <p class="text-muted small">Hisobingizga kiring</p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                <!-- Parol bilan kirish -->
                <form method="POST" id="loginForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Foydalanuvchi nomi</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control"
                                placeholder="Username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Parol</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                placeholder="Parol" required>
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword()">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Kirish
                    </button>
                </form>

                <div class="text-center text-muted mb-3">— yoki —</div>

                <!-- Yuz aniqlash -->
                <button class="btn face-btn w-100 mb-3" onclick="startFaceLogin()">
                    <i class="fas fa-camera me-2"></i>Yuz orqali kirish
                </button>

                <div id="faceSection" style="display:none;">
                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>
                    <button class="btn btn-success w-100 mt-2" onclick="captureAndLogin()">
                        <i class="fas fa-check me-2"></i>Tasdiqlash
                    </button>
                    <button class="btn btn-outline-secondary w-100 mt-2" onclick="stopCamera()">
                        Bekor qilish
                    </button>
                </div>

                <div id="faceMessage" class="alert mt-2" style="display:none;"></div>

                <hr>
                <div class="text-center">
                    <p class="mb-0">Hisobingiz yo'qmi?
                        <a href="/accounts/register/" class="text-primary fw-bold">Ro'yxatdan o'ting</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const pwd = document.querySelector('input[name="password"]');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        pwd.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

let stream = null;

async function startFaceLogin() {
    document.getElementById('faceSection').style.display = 'block';
    const video = document.getElementById('video');
    video.style.display = 'block';
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

function stopCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('faceSection').style.display = 'none';
}

async function captureAndLogin() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg');

    const msg = document.getElementById('faceMessage');
    msg.style.display = 'block';
    msg.className = 'alert alert-info mt-2';
    msg.textContent = 'Yuz tekshirilmoqda...';

    try {
        const response = await fetch('/api/accounts/face-login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
        });
        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            msg.className = 'alert alert-success mt-2';
            msg.textContent = 'Muvaffaqiyatli! Yo\'naltirilmoqda...';
            stopCamera();
            setTimeout(() => window.location.href = '/', 1000);
        } else {
            msg.className = 'alert alert-danger mt-2';
            msg.textContent = data.error || 'Yuz tanilmadi!';
        }
    } catch(e) {
        msg.className = 'alert alert-danger mt-2';
        msg.textContent = 'Xatolik yuz berdi!';
    }
}
</script>
</body>
</html>
