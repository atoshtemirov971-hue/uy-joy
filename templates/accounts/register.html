<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish — Uy-Joy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2563eb, #1e40af); min-height:100vh; display:flex; align-items:center; padding:30px 0; }
        .auth-card { border:none; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
        .btn-primary { background:#2563eb; border:none; }
        .btn-primary:hover { background:#1e40af; }
        .step-indicator { display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
        .step { width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; }
        .step.active { background:#2563eb; color:white; }
        .step.done { background:#10b981; color:white; }
        .step.inactive { background:#e2e8f0; color:#94a3b8; }
        #video { width:100%; border-radius:12px; }
        #canvas { display:none; }
        .face-preview { width:100%; border-radius:12px; display:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card auth-card p-4">
                <div class="text-center mb-3">
                    <i class="fas fa-home fa-2x text-primary mb-2"></i>
                    <h4 class="fw-bold">Ro'yxatdan o'tish</h4>
                </div>

                <!-- Step indicator -->
                <div class="step-indicator">
                    <div class="step active" id="step1-ind">1</div>
                    <div class="step inactive" id="step2-ind">2</div>
                    <div class="step inactive" id="step3-ind">3</div>
                </div>

                <!-- Step 1: Ma'lumotlar -->
                <div id="step1">
                    <h6 class="fw-bold mb-3">Shaxsiy ma'lumotlar</h6>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Foydalanuvchi nomi *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" id="username" class="form-control" placeholder="Username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="email" class="form-control" placeholder="Email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefon</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="text" id="phone" class="form-control" placeholder="+998 90 123 45 67">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Rol *</label>
                        <select id="role" class="form-select">
                            <option value="buyer">Xaridor</option>
                            <option value="seller">Sotuvchi</option>
                            <option value="agent">Agent</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Parol *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="Kamida 8 ta belgi">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Parolni tasdiqlang *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password2" class="form-control" placeholder="Parolni takrorlang">
                        </div>
                    </div>
                    <div id="step1Error" class="alert alert-danger" style="display:none;"></div>
                    <button class="btn btn-primary w-100" onclick="goStep2()">
                        Davom etish <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </div>

                <!-- Step 2: Yuz ro'yxatdan o'tish -->
                <div id="step2" style="display:none;">
                    <h6 class="fw-bold mb-3">Yuz aniqlash (ixtiyoriy)</h6>
                    <p class="text-muted small mb-3">
                        Keyinchalik yuz orqali tizimga kirish uchun yuzingizni ro'yxatdan o'tkazing.
                    </p>
                    <video id="video" autoplay style="display:none;"></video>
                    <canvas id="canvas"></canvas>
                    <img id="facePreview" class="face-preview mb-3">
                    <div id="step2Message" class="alert" style="display:none;"></div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-success" id="startCameraBtn" onclick="startCamera()">
                            <i class="fas fa-camera me-2"></i>Kamerani yoqish
                        </button>
                        <button class="btn btn-primary" id="captureBtn" onclick="captureFace()" style="display:none;">
                            <i class="fas fa-camera me-2"></i>Rasm olish
                        </button>
                        <button class="btn btn-outline-secondary" onclick="skipFace()">
                            O'tkazib yuborish
                        </button>
                    </div>
                </div>

                <!-- Step 3: Tasdiqlash -->
                <div id="step3" style="display:none;">
                    <div class="text-center py-4">
                        <div id="loadingSpinner">
                            <div class="spinner-border text-primary mb-3"></div>
                            <p>Ro'yxatdan o'tilmoqda...</p>
                        </div>
                        <div id="successMsg" style="display:none;">
                            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                            <h5 class="fw-bold">Muvaffaqiyatli!</h5>
                            <p class="text-muted">Hisobingiz yaratildi. Tizimga kirishingiz mumkin.</p>
                            <a href="/accounts/login/" class="btn btn-primary">Kirish</a>
                        </div>
                        <div id="errorMsg" style="display:none;">
                            <i class="fas fa-times-circle fa-4x text-danger mb-3"></i>
                            <h5 class="fw-bold">Xatolik!</h5>
                            <p class="text-muted" id="errorText"></p>
                            <button class="btn btn-primary" onclick="goStep1()">Qayta urinish</button>
                        </div>
                    </div>
                </div>

                <hr class="mt-4">
                <div class="text-center">
                    <p class="mb-0">Hisobingiz bormi?
                        <a href="/accounts/login/" class="text-primary fw-bold">Kirish</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let stream = null;
let faceImageData = null;

function goStep1() {
    document.getElementById('step1').style.display = 'block';
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step1-ind').className = 'step active';
    document.getElementById('step2-ind').className = 'step inactive';
    document.getElementById('step3-ind').className = 'step inactive';
}

function goStep2() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const err = document.getElementById('step1Error');

    if (!username || !email || !password) {
        err.style.display = 'block';
        err.textContent = 'Barcha majburiy maydonlarni to\'ldiring!';
        return;
    }
    if (password !== password2) {
        err.style.display = 'block';
        err.textContent = 'Parollar mos kelmadi!';
        return;
    }
    if (password.length < 8) {
        err.style.display = 'block';
        err.textContent = 'Parol kamida 8 ta belgi bo\'lishi kerak!';
        return;
    }
    err.style.display = 'none';
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    document.getElementById('step1-ind').className = 'step done';
    document.getElementById('step2-ind').className = 'step active';
}

async function startCamera() {
    const video = document.getElementById('video');
    video.style.display = 'block';
    document.getElementById('startCameraBtn').style.display = 'none';
    document.getElementById('captureBtn').style.display = 'block';
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

function captureFace() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    faceImageData = canvas.toDataURL('image/jpeg');
    const preview = document.getElementById('facePreview');
    preview.src = faceImageData;
    preview.style.display = 'block';
    if (stream) stream.getTracks().forEach(t => t.stop());
    video.style.display = 'none';
    document.getElementById('captureBtn').style.display = 'none';
    const msg = document.getElementById('step2Message');
    msg.style.display = 'block';
    msg.className = 'alert alert-success';
    msg.textContent = 'Yuz rasmi olindi! Ro\'yxatdan o\'tishni davom ettiring.';
    setTimeout(() => register(), 1000);
}

function skipFace() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    register();
}

async function register() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
    document.getElementById('step2-ind').className = 'step done';
    document.getElementById('step3-ind').className = 'step active';

    const formData = new FormData();
    formData.append('username', document.getElementById('username').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('phone', document.getElementById('phone').value);
    formData.append('role', document.getElementById('role').value);
    formData.append('password', document.getElementById('password').value);
    formData.append('password2', document.getElementById('password2').value);

    try {
        const response = await fetch('/api/accounts/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                password: document.getElementById('password').value,
                password2: document.getElementById('password2').value,
            })
        });
        const data = await response.json();
        document.getElementById('loadingSpinner').style.display = 'none';
        if (response.ok) {
            document.getElementById('successMsg').style.display = 'block';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorText').textContent = JSON.stringify(data);
        }
    } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorText').textContent = 'Xatolik yuz berdi!';
    }
}
</script>
</body>
</html>
